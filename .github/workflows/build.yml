name: Build Windows EXE
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --name TiffinBillSender --clean --noconfirm main.py

      - name: Package deliverable
        run: |
          mkdir deliverable
          copy dist\TiffinBillSender.exe deliverable\
          xcopy /E /I config deliverable\config
          copy README.txt deliverable\
          mkdir deliverable\pdfs_folder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TiffinBillSender-win-fixed
          path: deliverable/
