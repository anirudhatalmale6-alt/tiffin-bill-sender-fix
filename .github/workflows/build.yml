name: Build Windows EXE
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --name TiffinBillSender --clean --noconfirm --hidden-import=selenium.webdriver.chrome.webdriver --hidden-import=selenium.webdriver.chrome.service --hidden-import=selenium.webdriver.chrome.options --hidden-import=selenium.webdriver.common.by --hidden-import=selenium.webdriver.common.keys --hidden-import=selenium.webdriver.common.action_chains --hidden-import=selenium.webdriver.support.ui --hidden-import=selenium.webdriver.support.expected_conditions --hidden-import=selenium.webdriver.support.wait --hidden-import=selenium.webdriver.remote.webdriver --hidden-import=selenium.webdriver.remote.webelement --hidden-import=selenium.webdriver.common.desired_capabilities --hidden-import=webdriver_manager.chrome --collect-all=selenium --collect-all=webdriver_manager main.py

      - name: Package deliverable
        run: |
          mkdir deliverable
          copy dist\TiffinBillSender.exe deliverable\
          xcopy /E /I config deliverable\config
          copy README.txt deliverable\
          mkdir deliverable\pdfs_folder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TiffinBillSender-win-fixed
          path: deliverable/
